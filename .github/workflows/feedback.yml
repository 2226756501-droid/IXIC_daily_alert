name: Adjust Sensitivity via Issue

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

permissions:
  issues: write
  contents: write

jobs:
  adjust:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, '敏感') || contains(github.event.comment.body, '敏感')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - id: adjust
        name: Adjust Threshold
        run: python adjust_threshold.py
        env:
          BODY: ${{ github.event.issue.body || github.event.comment.body }}
      - name: Commit Config
        run: |
          git config user.name "NASDAQ Bot"
          git config user.email "nasdaq-bot@users.noreply.github.com"
          git add threshold_config.json
          git diff --cached --quiet || git commit -m "chore: adjust sensitivity threshold"
          git push
      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ github.token }}
          ACTION: ${{ steps.adjust.outputs.action }}
          NEW_VAL: ${{ steps.adjust.outputs.new_multiplier }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "敏感度已调整：${ACTION}，当前倍率 = ${NEW_VAL}"
