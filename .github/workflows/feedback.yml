name: Feedback - Adjust Sensitivity

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

permissions:
  contents: write
  issues: write

jobs:
  adjust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: adjust
        run: python adjust_threshold.py
        env:
          BODY: ${{ github.event.issue.body || github.event.comment.body }}
      - if: steps.adjust.outputs.changed == 'true'
        run: |
          git config user.name "NASDAQ Bot"
          git config user.email "nasdaq-bot@users.noreply.github.com"
          git add threshold_config.json
          git diff --cached --quiet || git commit -m "config: adjust sensitivity"
          git push
      - if: steps.adjust.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ 已执行"${{ steps.adjust.outputs.action }}"操作，当前倍率为 ${{ steps.adjust.outputs.new_multiplier }}`
            });
