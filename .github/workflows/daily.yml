name: NASDAQ Daily Alert

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: python -m pytest tests/ -v --tb=short
      - run: python nasdaq.py
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      - run: python check_feedback.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      - run: python gold.py
      - run: |
          git config user.name "NASDAQ Bot"
          git config user.email "nasdaq-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily: update data"
          git pull --rebase origin main
          git push
      - name: Report health to healthchecks.io
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -fsS -m 10 "https://hc-ping.com/${{ secrets.HEALTHCHECKS_UUID }}" > /dev/null 2>&1 || true
          else
            curl -fsS -m 10 "https://hc-ping.com/${{ secrets.HEALTHCHECKS_UUID }}/fail" > /dev/null 2>&1 || true
          fi
