name: NASDAQ Daily Alert

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python nasdaq.py
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      - run: |
          git config user.name "NASDAQ Bot"
          git config user.email "nasdaq-bot@users.noreply.github.com"
          git pull --rebase --autostash origin main
           git add history.csv market_state.json memory.json
          git diff --cached --quiet || git commit -m "daily: update data"
          git push
